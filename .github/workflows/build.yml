name: Build and publish Home Assistant add-on

on:
  push:
    branches:
      - master
    paths:
      - "shelly-manager/**"
  workflow_dispatch:
  repository_dispatch:
    types: [shelly-manager-release]

jobs:
  version-bump:
    name: Auto-bump patch version
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bump patch version
        id: bump
        run: |
          CURRENT_VERSION=$(grep "^version:" shelly-manager/config.yaml | sed 's/version: *"\([^"]*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          # Split version and increment patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New version: $NEW_VERSION"

          # Update config.yaml
          sed -i "s/^version: \"${CURRENT_VERSION}\"/version: \"${NEW_VERSION}\"/" shelly-manager/config.yaml
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shelly-manager/config.yaml
          git commit -m "Bump shelly-manager to v${{ steps.bump.outputs.version }}"
          git push

  build-shelly-manager:
    name: Build multi-arch add-on
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest (after version bump)
        if: github.event_name == 'repository_dispatch'
        run: git pull origin ${{ github.ref_name }}

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep "^version:" shelly-manager/config.yaml | sed 's/version: *"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch add-on
        uses: docker/build-push-action@v5
        with:
          context: ./shelly-manager
          file: ./shelly-manager/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/addon-shelly-manager:latest
            ghcr.io/${{ github.repository_owner }}/addon-shelly-manager:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/addon-shelly-manager:${{ github.sha }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: [version-bump, build-shelly-manager]
    if: always() && needs.build-shelly-manager.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Pull latest (after version bump)
        if: github.event_name == 'repository_dispatch'
        run: git pull origin ${{ github.ref_name }}

      - name: Check if release should be created
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep "^version:" shelly-manager/config.yaml | sed 's/version: *"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Version was just bumped, always create release
            echo "create=true" >> $GITHUB_OUTPUT
          else
            # For push events, check if version changed
            git show HEAD^:shelly-manager/config.yaml > /tmp/old_config.yaml 2>/dev/null || echo "version: \"0.0.0\"" > /tmp/old_config.yaml
            PREVIOUS_VERSION=$(grep "^version:" /tmp/old_config.yaml | sed 's/version: *"\([^"]*\)".*/\1/')

            if [ "$VERSION" != "$PREVIOUS_VERSION" ]; then
              echo "Version changed from $PREVIOUS_VERSION to $VERSION"
              echo "create=true" >> $GITHUB_OUTPUT
            else
              echo "Version unchanged, skipping release"
              echo "create=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create Release
        if: steps.check.outputs.create == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.version }}
          name: Shelly Manager v${{ steps.check.outputs.version }}
          generate_release_notes: true
          body: |
            ## Shelly Manager v${{ steps.check.outputs.version }}

            ### Installation
            Add this repository to your Home Assistant add-on store:
            ```
            https://github.com/jfmlima/home-assistant-addons
            ```

            ### Docker Image
            ```
            ghcr.io/jfmlima/addon-shelly-manager:${{ steps.check.outputs.version }}
            ```

            ---
            See the auto-generated changelog below for details on what changed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
